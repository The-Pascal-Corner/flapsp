<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="crispEdges">
  <defs>
    <pattern id="grid" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="none"/>
      <rect width="16" height="16" fill="none" stroke="#ddd" stroke-width="1"/>
    </pattern>
    <g id="diamond">
      <rect x="6" y="0" width="6" height="6"/>
      <rect x="0" y="6" width="18" height="6"/>
      <rect x="6" y="12" width="6" height="6"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="#eaeaea"/>
  <rect width="512" height="512" fill="url(#grid)"/>

  <!-- Outer border -->
  <rect x="20" y="20" width="472" height="6" fill="#bbb"/>
  <rect x="20" y="486" width="472" height="6" fill="#bbb"/>
  <rect x="20" y="20" width="6" height="472" fill="#bbb"/>
  <rect x="486" y="20" width="6" height="472" fill="#bbb"/>
  <rect x="26" y="26" width="460" height="2" fill="#888"/>
  <rect x="26" y="484" width="460" height="2" fill="#888"/>
  <rect x="26" y="26" width="2" height="460" fill="#888"/>
  <rect x="484" y="26" width="2" height="460" fill="#888"/>

  <!-- Inner screen -->
  <rect x="28" y="28" width="456" height="456" fill="#f0f0f0"/>

  <!-- Corner diamonds -->
  <use href="#diamond" x="40" y="40" fill="#ccc"/>
  <use href="#diamond" x="464" y="40" fill="#ccc"/>
  <use href="#diamond" x="40" y="464" fill="#ccc"/>
  <use href="#diamond" x="464" y="464" fill="#ccc"/>

  <!-- Corner flourishes -->
  <g fill="#ddd">
    <rect x="52" y="40" width="24" height="6"/>
    <rect x="52" y="40" width="6" height="24"/>
    <rect x="436" y="40" width="24" height="6"/>
    <rect x="454" y="40" width="6" height="24"/>
    <rect x="52" y="462" width="24" height="6"/>
    <rect x="52" y="462" width="6" height="24"/>
    <rect x="436" y="462" width="24" height="6"/>
    <rect x="454" y="462" width="6" height="24"/>
  </g>

  <!-- Joystick base panel -->
  <rect x="136" y="216" width="240" height="72" fill="#1a1a1a"/>
  <rect x="136" y="216" width="240" height="4" fill="#333"/>
  <rect x="136" y="216" width="4" height="72" fill="#333"/>
  <rect x="136" y="284" width="240" height="4" fill="#555"/>
  <rect x="372" y="216" width="4" height="72" fill="#555"/>

  <!-- Panel surface lines -->
  <rect x="140" y="228" width="232" height="2" fill="#333"/>
  <rect x="140" y="256" width="232" height="2" fill="#333"/>

  <!-- Joystick shaft -->
  <rect x="170" y="158" width="20" height="58" fill="#1a1a1a"/>
  <rect x="170" y="158" width="20" height="4" fill="#333"/>
  <rect x="170" y="158" width="4" height="58" fill="#333"/>
  <rect x="186" y="180" width="4" height="36" fill="#555"/>

  <!-- Shaft base grommet -->
  <rect x="162" y="212" width="36" height="8" fill="#1a1a1a"/>
  <rect x="162" y="212" width="36" height="2" fill="#666"/>
  <rect x="162" y="212" width="2" height="8" fill="#666"/>
  <rect x="196" y="212" width="2" height="8" fill="#333"/>

  <!-- Ball top -->
  <rect x="156" y="130" width="48" height="28" fill="#1a1a1a"/>
  <rect x="156" y="130" width="48" height="4" fill="#333"/>
  <rect x="156" y="130" width="4" height="28" fill="#333"/>
  <rect x="200" y="130" width="4" height="28" fill="#555"/>
  <rect x="156" y="154" width="48" height="4" fill="#555"/>

  <!-- Ball top highlight curve -->
  <rect x="162" y="126" width="36" height="4" fill="#1a1a1a"/>
  <rect x="162" y="126" width="36" height="2" fill="#333"/>

  <!-- Button 1 -->
  <rect x="296" y="230" width="28" height="28" fill="#1a1a1a"/>
  <rect x="296" y="230" width="28" height="4" fill="#666"/>
  <rect x="296" y="230" width="4" height="28" fill="#666"/>
  <rect x="320" y="230" width="4" height="28" fill="#333"/>
  <rect x="296" y="254" width="28" height="4" fill="#333"/>
  <!-- Button 1 inner -->
  <rect x="304" y="238" width="12" height="12" fill="#eaeaea"/>
  <rect x="304" y="238" width="12" height="2" fill="#ccc"/>
  <rect x="304" y="238" width="2" height="12" fill="#ccc"/>

  <!-- Button 2 -->
  <rect x="332" y="230" width="28" height="28" fill="#1a1a1a"/>
  <rect x="332" y="230" width="28" height="4" fill="#666"/>
  <rect x="332" y="230" width="4" height="28" fill="#666"/>
  <rect x="356" y="230" width="4" height="28" fill="#333"/>
  <rect x="332" y="254" width="28" height="4" fill="#333"/>
  <!-- Button 2 inner -->
  <rect x="340" y="238" width="12" height="12" fill="#eaeaea"/>
  <rect x="340" y="238" width="12" height="2" fill="#ccc"/>
  <rect x="340" y="238" width="2" height="12" fill="#ccc"/>

  <!-- Pixel divider -->
  <rect x="120" y="340" width="272" height="4" fill="#ccc"/>
  <rect x="132" y="344" width="248" height="2" fill="#aaa"/>

  <!-- Divider bracket accents -->
  <rect x="108" y="338" width="6" height="8" fill="#ddd"/>
  <rect x="106" y="340" width="8" height="4" fill="#ddd"/>
  <rect x="398" y="338" width="6" height="8" fill="#ddd"/>
  <rect x="398" y="340" width="8" height="4" fill="#ddd"/>

  <!-- Text -->
  <text x="256" y="406" font-family="'Press Start 2P',monospace" font-size="48"
        text-anchor="middle" fill="#1a1a1a" letter-spacing="6">FLAPSP</text>

  <text x="256" y="442" font-family="'Press Start 2P',monospace" font-size="13"
        text-anchor="middle" fill="#888" letter-spacing="4">THE PASCAL CORNER</text>

  <!-- Decorative dots -->
  <g fill="#ccc">
    <rect x="86" y="100" width="4" height="4"/>
    <rect x="422" y="100" width="4" height="4"/>
    <rect x="86" y="406" width="4" height="4"/>
    <rect x="422" y="406" width="4" height="4"/>
    <rect x="100" y="74" width="4" height="4"/>
    <rect x="408" y="74" width="4" height="4"/>
    <rect x="100" y="432" width="4" height="4"/>
    <rect x="408" y="432" width="4" height="4"/>
  </g>
</svg>
